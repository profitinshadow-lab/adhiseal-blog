# Trigger: 19 March 2026 01:30 AM
name: Deploy AdhiSeal Blog

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'  # Runs daily at midnight UTC
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Generate AI Blog Post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -n "$GEMINI_API_KEY" ]; then
            python ai_blog_generator.py
          else
            echo "⚠️ GEMINI_API_KEY not found, skipping AI generation."
          fi

      - name: Commit AI Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/posts.json
          git commit -m "chore: auto-publish daily AI blog post" || echo "No changes to commit"
          git push origin main || echo "No push needed"

      - name: Generate Static Pages
        run: |
          python generate.py --multi --no-submit

      - name: 📂 Sync files to Hostinger (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./output/
          server-dir: public_html/blog/  # Targeting the blog subdirectory
          dangerous-clean-slate: true
